<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl - Controle Financeiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; }
        .sidebar { transition: transform 0.3s ease; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
        }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar fixed md:relative w-64 bg-zinc-900 h-full border-r border-zinc-800 z-50 flex flex-col">
            <div class="p-6 border-b border-zinc-800">
                <h1 class="text-2xl font-bold text-emerald-400">FinControl</h1>
                <p class="text-zinc-400 text-sm">Tons de Rosa</p>
            </div>
            <nav class="flex-1 p-4 space-y-1">
                <a href="#" onclick="showSection('dashboard')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 text-zinc-300 hover:text-white active">
                    <i class="fas fa-home w-5"></i> Dashboard
                </a>
                <a href="#" onclick="showSection('receber')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 text-zinc-300 hover:text-white">
                    <i class="fas fa-hand-holding-dollar w-5"></i> A Receber
                </a>
                <a href="#" onclick="showSection('entradas')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 text-zinc-300 hover:text-white">
                    <i class="fas fa-arrow-up w-5"></i> Entradas
                </a>
                <a href="#" onclick="showSection('saidas')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 text-zinc-300 hover:text-white">
                    <i class="fas fa-arrow-down w-5"></i> Saídas
                </a>
                <a href="#" onclick="showSection('dividas')" class="flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 text-zinc-300 hover:text-white">
                    <i class="fas fa-credit-card w-5"></i> Dívidas
                </a>
                <!-- Add more links as needed -->
            </nav>
            <div class="p-4 border-t border-zinc-800">
                <button onclick="exportCSV()" class="w-full bg-zinc-800 hover:bg-zinc-700 py-2 rounded-xl text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-download"></i> Exportar CSV
                </button>
                <button onclick="document.getElementById('importCSV').click()" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-500 py-2 rounded-xl text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-upload"></i> Importar CSV
                </button>
                <input type="file" id="importCSV" accept=".csv" class="hidden" onchange="importCSV(this)">
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Top Bar -->
            <header class="bg-zinc-900 border-b border-zinc-800 px-6 py-4 flex items-center justify-between">
                <div class="flex items-center gap-4">
                    <button onclick="toggleSidebar()" class="md:hidden text-2xl">
                        <i class="fas fa-bars"></i>
                    </button>
                    <h2 id="pageTitle" class="text-2xl font-semibold">Dashboard</h2>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="showAddModal()" class="bg-emerald-600 hover:bg-emerald-500 px-5 py-2 rounded-2xl flex items-center gap-2 font-medium">
                        <i class="fas fa-plus"></i> Nova Transação
                    </button>
                </div>
            </header>

            <!-- Content Area -->
            <div class="flex-1 overflow-auto p-6" id="mainContent">
                <!-- Dashboard will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Add Transaction Modal -->
    <div id="addModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl w-full max-w-lg mx-4 p-8">
            <h3 class="text-2xl font-semibold mb-6">Nova Transação</h3>
            <form id="transactionForm" onsubmit="saveTransaction(event)">
                <!-- Form fields -->
                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Tipo</label>
                        <select id="type" class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3 text-white">
                            <option value="receita">Receita / A Receber</option>
                            <option value="despesa">Despesa / A Pagar</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Descrição</label>
                        <input type="text" id="description" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">Valor (R$)</label>
                            <input type="number" id="amount" step="0.01" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                        </div>
                        <div>
                            <label class="block text-sm text-zinc-400 mb-1">Data</label>
                            <input type="date" id="date" required class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                        </div>
                    </div>
                    <div>
                        <label class="block text-sm text-zinc-400 mb-1">Categoria</label>
                        <input type="text" id="category" placeholder="Perfumes, Maquiagem..." class="w-full bg-zinc-800 border border-zinc-700 rounded-2xl px-4 py-3">
                    </div>
                </div>
                <div class="flex gap-4 mt-8">
                    <button type="button" onclick="closeModal()" class="flex-1 py-4 rounded-2xl border border-zinc-700 hover:bg-zinc-800">Cancelar</button>
                    <button type="submit" class="flex-1 py-4 bg-emerald-600 hover:bg-emerald-500 rounded-2xl">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // Data storage
        let transactions = JSON.parse(localStorage.getItem('fincontrol_transactions')) || [];

        function saveData() {
            localStorage.setItem('fincontrol_transactions', JSON.stringify(transactions));
        }

        function showSection(section) {
            // Simple section switching (expand later)
            document.getElementById('mainContent').innerHTML = `<div class="text-center py-20"><h3 class="text-3xl">Seção ${section} em desenvolvimento</h3></div>`;
        }

        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }

        function showAddModal() {
            document.getElementById('addModal').classList.remove('hidden');
            document.getElementById('transactionForm').reset();
        }

        function closeModal() {
            document.getElementById('addModal').classList.add('hidden');
        }

        function saveTransaction(e) {
            e.preventDefault();
            const newTrans = {
                id: Date.now(),
                type: document.getElementById('type').value,
                description: document.getElementById('description').value,
                amount: parseFloat(document.getElementById('amount').value),
                date: document.getElementById('date').value,
                category: document.getElementById('category').value || 'Geral',
                paid: false
            };
            transactions.push(newTrans);
            saveData();
            closeModal();
            showToast('Transação salva com sucesso!');
            renderDashboard();
        }

        function showToast(msg) {
            const toast = document.createElement('div');
            toast.className = 'fixed bottom-4 right-4 bg-emerald-600 text-white px-6 py-3 rounded-2xl shadow-xl';
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        // CSV Export
        function exportCSV() {
            let csv = 'ID,Data,Tipo,Descricao,Valor,Categoria,Pago\n';
            transactions.forEach(t => {
                csv += `${t.id},${t.date},${t.type},${t.description},${t.amount},${t.category},${t.paid}\n`;
            });
            const blob = new Blob([csv], { type: 'text/csv' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'fincontrol_export.csv';
            a.click();
        }

        // CSV Import
        function importCSV(input) {
            const file = input.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                const text = e.target.result;
                const rows = text.split('\n').slice(1); // skip header
                rows.forEach(row => {
                    if (!row.trim()) return;
                    const [id, date, type, description, amount, category, paid] = row.split(',');
                    if (date && description && amount) {
                        transactions.push({
                            id: id || Date.now(),
                            date: date,
                            type: type || 'receita',
                            description: description,
                            amount: parseFloat(amount),
                            category: category || 'Geral',
                            paid: paid === 'true'
                        });
                    }
                });
                saveData();
                showToast('CSV importado com sucesso! ' + rows.length + ' registros');
                renderDashboard();
            };
            reader.readAsText(file);
        }

        // Dashboard with Previsao
        function renderDashboard() {
            const currentMonth = new Date().toISOString().slice(0,7); // YYYY-MM
            let receitasPrev = 0, despesasPrev = 0;
            let listReceber = '', listPagar = '';

            transactions.forEach(t => {
                if (t.date.startsWith(currentMonth)) {
                    if (t.type === 'receita') {
                        receitasPrev += t.amount;
                        if (!t.paid) listReceber += `<div class="flex justify-between py-2"><span>${t.description}</span><span class="text-emerald-400">R$ ${t.amount.toFixed(2)}</span></div>`;
                    } else {
                        despesasPrev += t.amount;
                        if (!t.paid) listPagar += `<div class="flex justify-between py-2"><span>${t.description}</span><span class="text-red-400">-R$ ${t.amount.toFixed(2)}</span></div>`;
                    }
                }
            });

            const saldoPrev = receitasPrev - despesasPrev;

            const html = `
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <h3 class="text-zinc-400">Recebíveis Previsto</h3>
                        <p class="text-4xl font-bold text-emerald-400 mt-2">R$ ${receitasPrev.toFixed(2)}</p>
                        <div class="mt-4">${listReceber || '<p class="text-zinc-500">Nenhum recebível este mês</p>'}</div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <h3 class="text-zinc-400">Pagamentos Previsto</h3>
                        <p class="text-4xl font-bold text-red-400 mt-2">-R$ ${despesasPrev.toFixed(2)}</p>
                        <div class="mt-4">${listPagar || '<p class="text-zinc-500">Nenhum pagamento este mês</p>'}</div>
                    </div>
                    <div class="bg-zinc-900 rounded-3xl p-6">
                        <h3 class="text-zinc-400">Saldo Projetado</h3>
                        <p class="text-4xl font-bold ${saldoPrev >= 0 ? 'text-emerald-400' : 'text-red-400'} mt-2">R$ ${saldoPrev.toFixed(2)}</p>
                    </div>
                </div>
                <!-- Add charts and more here later -->
                <div class="mt-8">
                    <h3 class="text-xl font-semibold mb-4">Transações Recentes</h3>
                    <div id="recentList" class="space-y-3"></div>
                </div>
            `;
            document.getElementById('mainContent').innerHTML = html;
            // Render recent list...
        }

        // Initial load
        window.onload = () => {
            renderDashboard();
        };
    </script>
</body>
</html>
