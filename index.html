<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FinControl - Tons de Rosa</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; }
        .sidebar { transition: all 0.3s; }
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .sidebar.open { transform: translateX(0); }
        }
        .section { display: none; }
        .section.active { display: block; }
        .modal { animation: pop 0.3s; }
        @keyframes pop { from { opacity: 0; scale: 0.95; } to { opacity: 1; scale: 1; } }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100 min-h-screen">
    <div class="flex h-screen">
        <!-- Sidebar -->
        <div id="sidebar" class="sidebar w-64 bg-zinc-900 border-r border-zinc-800 flex flex-col fixed md:relative h-full z-50">
            <div class="p-4 border-b border-zinc-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-pink-600 rounded-xl flex items-center justify-center text-white font-bold">TR</div>
                    <div>
                        <h1 class="font-bold text-xl">FinControl</h1>
                        <p class="text-xs text-zinc-400">Tons de Rosa</p>
                    </div>
                </div>
            </div>
            
            <nav class="flex-1 p-3">
                <a onclick="navigate('dashboard')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 cursor-pointer active">
                    <i class="fas fa-home"></i> Dashboard
                </a>
                <a onclick="navigate('receber')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 cursor-pointer">
                    <i class="fas fa-hand-holding-dollar"></i> A Receber
                </a>
                <a onclick="navigate('entradas')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 cursor-pointer">
                    <i class="fas fa-arrow-up"></i> Entradas
                </a>
                <a onclick="navigate('saidas')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 cursor-pointer">
                    <i class="fas fa-arrow-down"></i> Saídas
                </a>
                <a onclick="navigate('dividas')" class="nav-item flex items-center gap-3 px-4 py-3 rounded-xl hover:bg-zinc-800 cursor-pointer">
                    <i class="fas fa-credit-card"></i> Dívidas
                </a>
            </nav>
            
            <div class="p-4 border-t border-zinc-800">
                <button onclick="exportCSV()" class="w-full bg-zinc-800 hover:bg-zinc-700 py-2 rounded-xl text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-download"></i> Exportar CSV
                </button>
                <button onclick="importCSV()" class="w-full mt-2 bg-emerald-600 hover:bg-emerald-700 py-2 rounded-xl text-sm flex items-center justify-center gap-2">
                    <i class="fas fa-upload"></i> Importar CSV
                </button>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-1 overflow-auto">
            <!-- Top Bar -->
            <div class="bg-zinc-900 border-b border-zinc-800 p-4 flex items-center justify-between md:pl-72">
                <button onclick="toggleSidebar()" class="md:hidden text-2xl">
                    <i class="fas fa-bars"></i>
                </button>
                <h2 id="page-title" class="text-2xl font-semibold">Dashboard</h2>
                <button onclick="newTransaction()" class="bg-emerald-600 hover:bg-emerald-700 px-5 py-2 rounded-2xl flex items-center gap-2">
                    <i class="fas fa-plus"></i> Nova Transação
                </button>
            </div>

            <!-- Content -->
            <div class="p-6">
                <!-- Dashboard -->
                <div id="dashboard" class="section active">
                    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        <!-- Cards here -->
                        <div class="bg-zinc-900 rounded-3xl p-6">
                            <div class="text-emerald-400 text-sm">TOTAL A RECEBER</div>
                            <div id="total-receber" class="text-4xl font-bold mt-2">R$ 0,00</div>
                        </div>
                        <!-- More cards... -->
                    </div>
                    <div class="mt-8">
                        <h3 class="text-lg font-medium mb-4">Previsão do Mês</h3>
                        <canvas id="chart" height="120"></canvas>
                    </div>
                </div>

                <!-- Other sections placeholders for now -->
                <div id="receber" class="section">
                    <h3 class="text-xl font-semibold mb-4">A Receber</h3>
                    <p>Funcionalidade em desenvolvimento avançado...</p>
                </div>
                <!-- Similar for other sections -->
            </div>
        </div>
    </div>

    <!-- Modal -->
    <div id="modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-zinc-900 rounded-3xl p-8 w-full max-w-md modal">
            <!-- Modal content -->
        </div>
    </div>

    <script>
        // Basic JS functionality
        let transactions = JSON.parse(localStorage.getItem('fincontrol_transactions')) || [];
        
        function saveData() {
            localStorage.setItem('fincontrol_transactions', JSON.stringify(transactions));
        }
        
        function navigate(section) {
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.getElementById(section).classList.add('active');
            document.getElementById('page-title').textContent = section === 'dashboard' ? 'Dashboard' : section.charAt(0).toUpperCase() + section.slice(1);
        }
        
        function toggleSidebar() {
            document.getElementById('sidebar').classList.toggle('open');
        }
        
        function newTransaction() {
            alert('Modal de nova transação em breve!');
        }
        
        function exportCSV() {
            alert('Export CSV em breve!');
        }
        
        function importCSV() {
            alert('Import CSV em breve!');
        }
        
        // Init
        window.onload = () => {
            console.log('FinControl carregado!');
            // Render basic dashboard
        };
    </script>
</body>
</html>
